services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: o1
      POSTGRES_USER: o1
      POSTGRES_PASSWORD: o1
    ports:
      - "55432:5432"
    volumes:
      - o1-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o1 -d o1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  o1-postgres:
